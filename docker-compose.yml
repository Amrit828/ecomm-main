services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ecomm-net

  auth-service:
    build: ./backend/auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      MONGO_URI: mongodb://mongodb:27017/EcommerceDB
      CART_SERVICE_URL: http://cart-service:8083
      JWT_SECRET: ${JWT_SECRET:-supersecretkey123456789012345678}
    depends_on:
      - mongodb
    networks:
      - ecomm-net

  product-service:
    build: ./backend/product-service
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      MONGO_URI: mongodb://mongodb:27017/EcommerceDB
    depends_on:
      - mongodb
    networks:
      - ecomm-net

  cart-service:
    build: ./backend/cart-service
    container_name: cart-service
    ports:
      - "8083:8083"
    environment:
      MONGO_URI: mongodb://mongodb:27017/EcommerceDB
      PRODUCT_SERVICE_URL: http://product-service:8082
    depends_on:
      - mongodb
      - product-service
    networks:
      - ecomm-net

  order-service:
    build: ./backend/order-service
    container_name: order-service
    ports:
      - "8084:8084"
    environment:
      MONGO_URI: mongodb://mongodb:27017/EcommerceDB
      PRODUCT_SERVICE_URL: http://product-service:8082
      CART_SERVICE_URL: http://cart-service:8083
    depends_on:
      - mongodb
      - product-service
      - cart-service
    networks:
      - ecomm-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AUTH_URL: ${VITE_AUTH_URL:-http://localhost:8081}
        VITE_PRODUCT_URL: ${VITE_PRODUCT_URL:-http://localhost:8082}
        VITE_CART_URL: ${VITE_CART_URL:-http://localhost:8083}
        VITE_ORDER_URL: ${VITE_ORDER_URL:-http://localhost:8084}
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - product-service
      - cart-service
      - order-service
    networks:
      - ecomm-net

volumes:
  mongo_data:

networks:
  ecomm-net:
    driver: bridge
